{{ define "main" }}
  <section id="scroll_anchor" class="two_column">
    <h3>все стихи:</h3>
    <ol>
      {{ range sort (where .Site.RegularPages "Section" "verses") "Title" }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Params.title | default .RelPermalink }}</a>
        </li>
      {{ end }}
    </ol>
    <div class="photo_box medal">
      <div class="photocard" aria-label="Леонид Семёнович Павлов"></div>
    </div>
  </section>
{{ end }}
